<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styl.css">
    <script src="obrazki.js"></script>
    <title>Efekty obrazu</title>
</head>
<body>

    <header>
        <h2>Efekty na obrazach</h2>
    </header>
    <div>
        <Img src="pszczola.jpg" alt="pszczoła na fioletowym kwiatku"  id="Psz"> <br>
        <input type="radio" value="Blur" name="kwiatki"> Blur<br>
        <input type="radio" value="Sepia" name="kwiatki"> Sepia <br> 
        <input type="radio" value="Negatyw" name="kwiatki"> Negatyw <br> 
        <button id="transformacja1">Zastosuj</button>
    </div>
    <div>
        <img src="pomarancza.jpg" alt="Drzewo pomarańczy" id="Pom"> <br>
        <button id="transformacjaK">Kolorowy</button> 
        <button id="transformacjaCZ">Czarno-biały</button> <br>
    </div>
    <div>
        <img src="owoce.jpg" alt="Kosz pełen owoców"  id="Owc"> <br>
        <input type="range" min="0" max="100" value="100" id="suwak1"> <br>
        <button id="transformacja3">Zastosuj</button> 
    </div>
    <div>
        <img src="zolw.jpg" alt="żółw w wodzie"  id="Zol"> <br>
        <input type="range" min="0" max="250" id="suwak2"> <br>
        <button id="transformacja4">Zastosuj</button> 
    </div>

    <footer> 
        <p> <a href="https://www.css.com/" target="blank"> Zobacz inne efekty obrazu</a></p>
        <p>Stronę wykonał: 01020304050</p>
    </footer>
    
</body>
</html>
