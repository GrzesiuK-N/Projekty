<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            background-color: ivory;
        }
       
        #biale {
           width: 300px;
           height: 25px;
           background-color: aliceblue;
        }

        #zielone {
            animation-name: ruch;
            animation-duration: 5s;
            background-color: greenyellow;
            height: 25px;

        }
        @keyframes ruch {
            0% {width: (0px);} 
            50% {width: (300px);}
            100% {width: (0px);}
        }
    </style>
    <title>ladowanie</title>
</head>
<body>
   <div id="biale"> <div id="zielony"></div>
</div>
</body>
</html>
